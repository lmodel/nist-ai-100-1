    name: ResidualRisk_is_residual
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/is_residual
    description: 'Whether this risk represents risk remaining after risk treatment

      (residual risk per ISO Guide 73).'
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: is_residual
    domain: ResidualRisk
    slot_uri: nist_ai_100_1:is_residual
    ifabsent: 'True'
    alias: is_residual
    owner: ResidualRisk
    domain_of:
    - ResidualRisk
    is_usage_slot: true
    usage_slot_name: is_residual
    range: boolean
  Function_categories:
    name: Function_categories
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/categories
    description: Categories that belong to a Function.
    in_subset:
    - framework_core
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: categories
    domain: Function
    slot_uri: nist_ai_100_1:categories
    alias: categories
    owner: Function
    domain_of:
    - Function
    is_usage_slot: true
    usage_slot_name: categories
    range: Category
    multivalued: true
    inlined: true
    inlined_as_list: true
  Category_id:
    name: Category_id
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/id
    description: 'Identifier for the category, typically using the

      "FUNCTION N" form (e.g., "GOVERN 1").'
    in_subset:
    - base
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    mappings:
    - schema:identifier
    is_a: id
    domain: Category
    slot_uri: schema:identifier
    identifier: true
    alias: id
    owner: Category
    domain_of:
    - Category
    is_usage_slot: true
    usage_slot_name: id
    range: uriorcurie
    required: true
  Category_subcategories:
    name: Category_subcategories
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/subcategories
    description: Subcategories that belong to a Category.
    in_subset:
    - framework_core
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: subcategories
    domain: Category
    slot_uri: nist_ai_100_1:subcategories
    alias: subcategories
    owner: Category
    domain_of:
    - Category
    is_usage_slot: true
    usage_slot_name: subcategories
    range: Subcategory
    multivalued: true
    inlined: true
    inlined_as_list: true
  Subcategory_id:
    name: Subcategory_id
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/id
    description: 'Identifier for the subcategory in the "FUNCTION N.M" form

      (e.g., "GOVERN 1.1").'
    in_subset:
    - base
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    mappings:
    - schema:identifier
    is_a: id
    domain: Subcategory
    slot_uri: schema:identifier
    identifier: true
    alias: id
    owner: Subcategory
    domain_of:
    - Subcategory
    is_usage_slot: true
    usage_slot_name: id
    range: uriorcurie
    required: true
classes:
  NamedThingRMF:
    name: NamedThingRMF
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/NamedThingRMF
    description: A generic grouping for any identifiable AI RMF element.
    in_subset:
    - base
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    mappings:
    - schema:Thing
    close_mappings:
    - schema:Thing
    abstract: true
    slots:
    - id
    - name
    - title
    - description
    - see_also
    class_uri: schema:Thing
  AiSystem:
    name: AiSystem
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiSystem
    description: 'An engineered or machine-based system that can, for a given set

      of objectives, generate outputs such as predictions,

      recommendations, or decisions influencing real or virtual

      environments. AI systems are designed to operate with varying

      levels of autonomy (Adapted from OECD Recommendation on AI:2019;

      ISO/IEC 22989:2022).'
    in_subset:
    - lifecycle
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    close_mappings:
    - schema:SoftwareApplication
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - lifecycle_stage
    - ai_dimension
    class_uri: nist_ai_100_1:AiSystem
  AiSystemDimension:
    name: AiSystemDimension
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiSystemDimension
    description: 'A socio-technical dimension of an AI system (Figure 2):

      Application Context, Data and Input, AI Model, Task and Output,

      or People and Planet.'
    in_subset:
    - lifecycle
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - dimension_kind
    class_uri: nist_ai_100_1:AiSystemDimension
  AiLifecycleStage:
    name: AiLifecycleStage
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiLifecycleStage
    description: 'A stage of the AI lifecycle (Figure 2): Plan and Design,

      Collect and Process Data, Build and Use Model, Verify and

      Validate, Deploy and Use, or Operate and Monitor.'
    in_subset:
    - lifecycle
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - stage_kind
    - includes_tevv
    class_uri: nist_ai_100_1:AiLifecycleStage
  AiActor:
    name: AiActor
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiActor
    description: 'An organization or individual that plays an active role in the AI

      system lifecycle. AI actors include those who deploy or operate

      AI as well as those who inform via formal or quasi-formal norms

      and guidance (OECD 2019).'
    in_subset:
    - lifecycle
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    close_mappings:
    - prov:Agent
    - foaf:Agent
    related_mappings:
    - stix:Identity
    - iso27001:InterestedParty
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - actor_task
    - lifecycle_stage
    - is_tevv
    - audience
    class_uri: nist_ai_100_1:AiActor
  AiActorTask:
    name: AiActorTask
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiActorTask
    description: 'A category of task performed by AI actors (Appendix A). Each

      task is associated with one or more lifecycle stages and a

      typical set of actor roles.'
    in_subset:
    - lifecycle
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - task_kind
    - typical_actors
    - lifecycle_stage
    - ai_dimension
    class_uri: nist_ai_100_1:AiActorTask
  Risk:
    name: Risk
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Risk
    description: 'The composite measure of an event''s probability of occurring and

      the magnitude or degree of the consequences of that event. When

      considering negative impact, risk is a function of (1) the

      negative impact or magnitude of harm and (2) the likelihood of

      occurrence (Adapted from ISO 31000:2018; OMB Circular A-130:2016).'
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    exact_mappings:
    - iso27001:Risk
    related_mappings:
    - iso29100:PrivacyRisk
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - likelihood
    - magnitude
    - impact_sign
    - is_residual
    - risk_response
    - lifecycle_stage
    - trustworthiness_characteristic
    - related_impacts
    - affects_system
    class_uri: nist_ai_100_1:Risk
  Impact:
    name: Impact
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Impact
    description: 'A positive, negative, or both consequence of an AI system. Impacts

      can manifest as opportunities (positive) or threats (negative).'
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    narrow_mappings:
    - iso27001:ImpactRating
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - impact_sign
    - magnitude
    - likelihood
    - affects
    class_uri: nist_ai_100_1:Impact
  Harm:
    name: Harm
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Harm
    description: 'A negative impact that may be experienced by individuals,

      groups, communities, organizations, society, the environment, or

      the planet (Figure 1).'
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - harm_category
    - harm_to_people_subcategory
    - magnitude
    - affects
    class_uri: nist_ai_100_1:Harm
  ResidualRisk:
    name: ResidualRisk
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/ResidualRisk
    description: 'Risk remaining after risk treatment (ISO Guide 73). Documenting

      residual risks helps system providers consider risks of deploying

      the AI product and informs end users about potential negative

      impacts.'
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    narrow_mappings:
    - iso27001:Risk
    is_a: Risk
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - likelihood
    - magnitude
    - impact_sign
    - risk_response
    - lifecycle_stage
    - trustworthiness_characteristic
    - related_impacts
    - affects_system
    - ResidualRisk_is_residual
    slot_usage:
      is_residual:
        name: is_residual
        ifabsent: 'True'
    class_uri: nist_ai_100_1:ResidualRisk
  RiskTolerance:
    name: RiskTolerance
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/RiskTolerance
    description: 'The organization''s or AI actor''s readiness to bear risk in order

      to achieve its objectives (Adapted from ISO Guide 73). Risk

      tolerance is highly contextual and application- and use-case

      specific.'
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    close_mappings:
    - iso27001:RiskLevel
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - tolerance_statement
    - legal_basis
    class_uri: nist_ai_100_1:RiskTolerance
  RiskMeasurementChallenge:
    name: RiskMeasurementChallenge
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/RiskMeasurementChallenge
    description: "A challenge that complicates measurement of AI risks\n(Part 1 \xA7\
      1.2.1)."
    in_subset:
    - risk_and_harm
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - challenge_kind
    class_uri: nist_ai_100_1:RiskMeasurementChallenge
  TrustworthinessCharacteristic:
    name: TrustworthinessCharacteristic
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/TrustworthinessCharacteristic
    description: "A characteristic of a trustworthy AI system (Figure 4 / Part 1\n\
      \xA73). The seven characteristics are inter-related; addressing them\nindividually\
      \ does not guarantee trustworthiness, and tradeoffs\nare usually involved."
    in_subset:
    - trustworthiness
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - characteristic_kind
    - is_base_condition
    - is_cross_cutting
    class_uri: nist_ai_100_1:TrustworthinessCharacteristic
  Bias:
    name: Bias
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Bias
    description: "A form of AI bias - a deviation that may be perpetuated or\namplified\
      \ by AI systems. NIST identifies three major categories:\nsystemic, computational/statistical,\
      \ and human-cognitive\n(Part 1 \xA73.7; NIST SP 1270)."
    in_subset:
    - trustworthiness
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    related_mappings:
    - iso29100:PrivacyPrinciple
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - bias_category
    class_uri: nist_ai_100_1:Bias
  Function:
    name: Function
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Function
    description: 'A top-level AI RMF Core function. Each function organizes AI risk

      management activities at the highest level. GOVERN applies across

      all stages; MAP, MEASURE, and MANAGE apply to AI-system-specific

      contexts and lifecycle stages.'
    in_subset:
    - framework_core
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    exact_mappings:
    - nist_csf:CSFFunction
    related_mappings:
    - gist_linkml:Function
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - function_code
    - Function_categories
    slot_usage:
      categories:
        name: categories
        range: Category
        multivalued: true
        inlined: true
        inlined_as_list: true
    class_uri: nist_ai_100_1:Function
  Category:
    name: Category
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Category
    description: 'A category within an AI RMF Core function (e.g., "GOVERN 1:

      Policies, processes, procedures, and practices ... are in place,

      transparent, and implemented effectively"). Categories group

      related subcategories.'
    in_subset:
    - framework_core
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    exact_mappings:
    - nist_csf:CSFCategory
    is_a: NamedThingRMF
    slots:
    - name
    - title
    - description
    - see_also
    - category_id
    - outcome
    - Category_subcategories
    - Category_id
    slot_usage:
      id:
        name: id
        description: 'Identifier for the category, typically using the

          "FUNCTION N" form (e.g., "GOVERN 1").'
      subcategories:
        name: subcategories
        range: Subcategory
        multivalued: true
        inlined: true
        inlined_as_list: true
    class_uri: nist_ai_100_1:Category
  Subcategory:
    name: Subcategory
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/Subcategory
    description: 'A subcategory within an AI RMF Core category (e.g., "GOVERN 1.1:

      Legal and regulatory requirements involving AI are understood,

      managed, and documented"). Subcategories express specific

      outcomes.'
    in_subset:
    - framework_core
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    exact_mappings:
    - nist_csf:CSFSubcategory
    close_mappings:
    - oscal_catalog:Control
    - nist_sp_800_53:Control
    is_a: NamedThingRMF
    slots:
    - name
    - title
    - description
    - see_also
    - subcategory_id
    - outcome
    - trustworthiness_characteristic
    - lifecycle_stage
    - about_text
    - suggested_actions_text
    - documentation_questions
    - references_text
    - topics
    - ai_actor_categories
    - Subcategory_id
    slot_usage:
      id:
        name: id
        description: 'Identifier for the subcategory in the "FUNCTION N.M" form

          (e.g., "GOVERN 1.1").'
    class_uri: nist_ai_100_1:Subcategory
  AiRmfProfile:
    name: AiRmfProfile
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiRmfProfile
    description: "An implementation of the AI RMF Functions, Categories, and\nSubcategories\
      \ for a specific setting or application based on the\nrequirements, risk tolerance,\
      \ and resources of the user (\xA76).\nProfiles may be use-case-specific, temporal\
      \ (current or target),\nor cross-sectoral."
    in_subset:
    - profiles
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    exact_mappings:
    - oscal_profile:Profile
    close_mappings:
    - nist_sp_800_53:ProfileDocument
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - profile_type
    - current_state
    - target_state
    - sector
    - addresses
    class_uri: nist_ai_100_1:AiRmfProfile
  RmfAttribute:
    name: RmfAttribute
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/RmfAttribute
    description: 'A design attribute of the AI RMF (Appendix D) - one of the

      qualities the Framework strives to embody (e.g., risk-based,

      consensus-driven, plain language, common language, easily usable,

      universally applicable, outcome-focused, leveraging existing

      standards, law- and regulation-agnostic, living document).'
    in_subset:
    - attributes
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    related_mappings:
    - nist_csf:CSFProperty
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    class_uri: nist_ai_100_1:RmfAttribute
  AiSpecificRisk:
    name: AiSpecificRisk
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiSpecificRisk
    description: 'A risk that is new or increased for AI-based technology compared

      to traditional software (Appendix B) - e.g., data quality, model

      drift, opacity, scale and complexity, pre-trained model

      uncertainty, emergent properties, privacy aggregation, or

      environmental cost.'
    in_subset:
    - ai_risk_distinctions
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    broad_mappings:
    - iso27001:Risk
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    class_uri: nist_ai_100_1:AiSpecificRisk
  HumanAiInteractionIssue:
    name: HumanAiInteractionIssue
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/HumanAiInteractionIssue
    description: 'An issue that merits further consideration in human-AI

      interaction (Appendix C) - e.g., clear human roles and

      responsibilities, systemic and human-cognitive biases in design,

      variability of human-AI interaction outcomes, complexity of

      presenting AI system information to humans.'
    in_subset:
    - human_ai_interaction
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    related_mappings:
    - iso27001:InterestedParty
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    class_uri: nist_ai_100_1:HumanAiInteractionIssue
  PlaybookEntry:
    name: PlaybookEntry
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/PlaybookEntry
    description: 'A single AI RMF Playbook entry - an enrichment of a Core

      subcategory with prose discussion, suggested actions,

      documentation questions, references, and topic tags.


      Attribute names use the same identifiers found in the published

      NIST AI RMF Playbook JSON (e.g., `section_about`,

      `section_actions`) so that the data can be loaded directly.'
    in_subset:
    - playbook
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    close_mappings:
    - nist_csf:CSFSubcategory
    slots:
    - playbookEntry__type
    - playbookEntry__title
    - playbookEntry__category
    - playbookEntry__description
    - playbookEntry__section_about
    - playbookEntry__section_actions
    - playbookEntry__section_doc
    - playbookEntry__section_ref
    - playbookEntry__ai_actors
    - playbookEntry__topic
    attributes:
      type:
        name: type
        description: 'Function label as serialised in the published Playbook JSON

          (Title case - "Govern", "Map", "Measure", "Manage"). For

          the controlled enum see `function_kind`.'
        range: string
      title:
        name: title
        description: 'Subcategory identifier (e.g., "GOVERN 1.1"). Mirrors the

          AI RMF Subcategory `subcategory_id`.'
        range: string
      category:
        name: category
        description: 'Category code in the form "FUNCTION-N" (e.g., "GOVERN-1")

          as used in the Playbook.'
        range: string
      description:
        name: description
        description: Outcome statement of the subcategory.
        range: string
      section_about:
        name: section_about
        description: Free-text discussion ("About" section).
        range: string
      section_actions:
        name: section_actions
        description: Bulleted suggested actions ("Actions" section).
        range: string
      section_doc:
        name: section_doc
        description: 'Documentation questions and transparency resources

          ("Documentation" section).'
        range: string
      section_ref:
        name: section_ref
        description: References and citations ("References" section).
        range: string
      ai_actors:
        name: ai_actors
        description: 'AI actor categories the entry applies to. Free-text to

          preserve the casing of the source data (e.g., "Governance

          and Oversight").'
        range: string
        multivalued: true
      topic:
        name: topic
        description: 'Topic tags (e.g., "Legal and Regulatory", "Validity and

          Reliability").'
        range: string
        multivalued: true
    class_uri: nist_ai_100_1:PlaybookEntry
    unique_keys:
      primary:
        unique_key_name: primary
        unique_key_slots:
        - title
  PlaybookCollection:
    name: PlaybookCollection
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/PlaybookCollection
    description: 'A container for a set of PlaybookEntry instances - the

      serialisation root for an AI RMF Playbook companion document.

      Validate with ``linkml-validate --target-class PlaybookCollection``;

      the canonical tree-root for the schema is ``AiRmfFramework``.'
    in_subset:
    - playbook
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    slots:
    - entries
    class_uri: nist_ai_100_1:PlaybookCollection
  AiRmfDocument:
    name: AiRmfDocument
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiRmfDocument
    description: 'Publication metadata for an instance of the AI RMF (e.g., NIST

      AI 100-1, January 2023). The Framework is intended to be a

      living document, employing a two-number versioning system (major.minor).'
    in_subset:
    - base
    from_schema: https://w3id.org/lmodel/nist-ai-100-1
    close_mappings:
    - nist_csf:CSFMetadata
    related_mappings:
    - schema:CreativeWork
    is_a: NamedThingRMF
    slots:
    - id
    - name
    - title
    - description
    - see_also
    - version
    - publisher
    - doi
    - published_date
    - source
    class_uri: nist_ai_100_1:AiRmfDocument
  AiRmfFramework:
    name: AiRmfFramework
    definition_uri: https://w3id.org/lmodel/nist-ai-100-1/AiRmfFramework
    description: 'Root container that bundles the AI RMF Core (Functions) with

      foundational concepts (trustworthiness characteristics,

      lifecycle, actors, risks, harms), profiles, and Framework

      attributes. Designed for serialising the Framework or a tailored

      instance of it as a single JSON / YAML document.'
    in_subset:
    - base
