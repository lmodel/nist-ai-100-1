---
id: https://w3id.org/lmodel/nist-ai-100-1
name: nist-ai-100-1
title: NIST AI Risk Management Framework (AI RMF 1.0)
description: |-
  LinkML schema for the NIST AI Risk Management Framework
  (AI RMF 1.0), published as NIST AI 100-1 (January 2023).

  Provides the structured, machine-readable taxonomy of the
  Framework's foundational concepts (risk, impact, harm, AI system,
  AI actor, lifecycle), the seven characteristics of trustworthy AI,
  and the four Core functions (GOVERN, MAP, MEASURE, MANAGE) together
  with their categories and subcategories. It also models AI RMF
  Profiles (use-case, temporal, cross-sectoral), the design
  attributes of the Framework, and the AI RMF Playbook companion
  data shape.
license: Apache-2.0
source: https://doi.org/10.6028/NIST.AI.100-1
version: 1.0.0
see_also:
  - https://w3id.org/lmodel/nist-ai-100-1
  - https://doi.org/10.6028/NIST.AI.100-1
  - https://www.nist.gov/itl/ai-risk-management-framework

prefixes:
  nist_ai_100_1: https://w3id.org/lmodel/nist-ai-100-1/
  linkml: https://w3id.org/linkml/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  skos: http://www.w3.org/2004/02/skos/core#
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  prov: http://www.w3.org/ns/prov#
  foaf: http://xmlns.com/foaf/0.1/
  xsd: http://www.w3.org/2001/XMLSchema#
  nist_csf: https://w3id.org/lmodel/nist-csf-v2/
  nist_sp_800_53: https://w3id.org/lmodel/nist-sp-800-53/
  nist_sp_800_218: https://w3id.org/lmodel/nist-sp-800-218/
  oscal_catalog: https://w3id.org/lmodel/oscal_catalog/
  oscal_profile: https://w3id.org/lmodel/oscal_profile/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso29100: https://w3id.org/lmodel/iso29100/
  gist_linkml: https://w3id.org/lmodel/gist/
  stix: https://w3id.org/lmodel/stix/
  doi: https://doi.org/

default_prefix: nist_ai_100_1
default_range: string

imports:
  - linkml:types

# ============================================================================
# Subsets - partition the model so consumers can adopt only the parts they need
# ============================================================================
subsets:
  base:
    description: |-
      Schema-infrastructure elements shared across the framework:
      identifier slots, the abstract `NamedThing` root, publication
      metadata, and the top-level `AiRmfFramework` container. Not a
      section of NIST AI 100-1 itself - distinct from `framework_core`
      (Part 2, §5 "AI RMF Core").

  framework_core:
    description: |-
      The AI RMF Core (Part 2, §5): the four high-level Functions
      (GOVERN, MAP, MEASURE, MANAGE) and their Categories and
      Subcategories - the catalog backbone of the Framework.

  trustworthiness:
    description: |-
      Characteristics of trustworthy AI systems (Part 1, §3):
      Valid and Reliable, Safe, Secure and Resilient, Accountable and
      Transparent, Explainable and Interpretable, Privacy-Enhanced, and
      Fair with Harmful Bias Managed.

  lifecycle:
    description: |-
      AI system lifecycle stages, key dimensions, AI actor categories,
      and AI actor tasks (Part 1, §2 Audience; Figures 2 and 3;
      Appendix A "Descriptions of AI Actor Tasks").

  risk_and_harm:
    description: |-
      Risk, impact, harm, residual risk, risk tolerance, risk
      measurement challenges, and risk response options (Part 1, §1
      "Framing Risk", incl. §1.2 Challenges).

  profiles:
    description: |-
      AI RMF profile constructs (Part 2, §6): use-case profiles,
      temporal (current / target) profiles, and cross-sectoral profiles.

  attributes:
    description: |-
      Design attributes of the AI RMF (Appendix D "Attributes of the
      AI RMF") - the qualities the Framework strives to embody.

  ai_risk_distinctions:
    description: |-
      Appendix B "How AI Risks Differ from Traditional Software Risks" -
      risks that are new or increased for AI-based technology (e.g.,
      data quality, model drift, opacity, scale and complexity,
      pre-trained model uncertainty, emergent properties, privacy
      aggregation, environmental cost).

  human_ai_interaction:
    description: |-
      Appendix C "AI Risk Management and Human-AI Interaction" -
      considerations for human roles and responsibilities, cognitive
      and systemic biases in design, variability of interaction
      outcomes, and presentation of AI information to humans.

  playbook:
    description: |-
      Companion-resource enrichment of an AI RMF subcategory with
      free-text discussion ("about"), suggested actions, documentation
      questions, and references - modelled after the NIST AI RMF
      Playbook JSON shape. (Not part of NIST AI 100-1 itself; cross-
      referenced in Part 2, §5.)

# ============================================================================
# Types - custom scalars
# ============================================================================
types:
  FunctionCode:
    typeof: string
    base: str
    uri: xsd:string
    pattern: "^(GOVERN|MAP|MEASURE|MANAGE)$"
    description: Identifier of one of the four AI RMF Core functions.

  CategoryCode:
    typeof: string
    base: str
    uri: xsd:string
    pattern: "^(GOVERN|MAP|MEASURE|MANAGE) [0-9]+$"
    description: Identifier for a Core category (e.g., "GOVERN 1", "MAP 3").

  SubcategoryCode:
    typeof: string
    base: str
    uri: xsd:string
    pattern: "^(GOVERN|MAP|MEASURE|MANAGE) [0-9]+\\.[0-9]+$"
    description: Identifier for a Core subcategory (e.g., "GOVERN 1.1").

# ============================================================================
# Enums
# ============================================================================
enums:
  FunctionEnum:
    description: |-
      The four high-level AI RMF Core functions. GOVERN is a
      cross-cutting function applied throughout; MAP, MEASURE, and MANAGE
      operate on specific AI systems and lifecycle stages.
    in_subset: [framework_core]
    permissible_values:
      GOVERN:
        description: |-
          Cultivates and implements a culture of risk management; outlines
          processes, documents, and organizational schemes that anticipate,
          identify, and manage AI risks.
      MAP:
        description: |-
          Establishes the context to frame risks related to an AI system;
          identifies risks based on intended purposes, capabilities, and
          contextual factors.
      MEASURE:
        description: |-
          Employs quantitative, qualitative, or mixed-method tools to
          analyze, assess, benchmark, and monitor AI risk and related impacts.
      MANAGE:
        description: |-
          Allocates risk resources to mapped and measured risks on a
          regular basis and as defined by the GOVERN function; risk
          treatment includes plans to respond to, recover from, and
          communicate about incidents or events.

  AiLifecycleStageEnum:
    description: |-
      AI lifecycle stages as defined in Figure 2 (modified from
      OECD 2022). Each stage corresponds to one of the AI system
      dimensions (see AiSystemDimensionEnum).
    in_subset: [lifecycle]
    permissible_values:
      PLAN_AND_DESIGN:
        description: |-
          Articulate and document the system's concept and objectives,
          underlying assumptions, context, and requirements (Application
          Context dimension).
      COLLECT_AND_PROCESS_DATA:
        description: |-
          Gather, validate, and clean data and document the metadata and
          characteristics of the dataset (Data and Input dimension).
      BUILD_AND_USE_MODEL:
        description: |-
          Create or select algorithms; train models (AI Model dimension).
      VERIFY_AND_VALIDATE:
        description: |-
          Verify, validate, calibrate, and interpret model output
          (AI Model dimension).
      DEPLOY_AND_USE:
        description: |-
          Pilot; check compatibility with legacy systems; verify regulatory
          compliance; manage organizational change; and evaluate user
          experience (Task and Output dimension).
      OPERATE_AND_MONITOR:
        description: |-
          Operate the AI system and continuously assess its recommendations
          and impacts (both intended and unintended) in light of objectives,
          legal and regulatory requirements, and ethical considerations
          (Application Context dimension).

  AiSystemDimensionEnum:
    description: |-
      Key socio-technical dimensions of an AI system (Figure 2).
      People and Planet sits at the centre representing human and
      societal well-being.
    in_subset: [lifecycle]
    permissible_values:
      APPLICATION_CONTEXT:
        description: |-
          The setting in which an AI system is deployed - includes legal,
          regulatory, ethical, and societal considerations.
      DATA_AND_INPUT:
        description: |-
          The data and inputs an AI system uses, including training,
          validation, test data, and operational inputs.
      AI_MODEL:
        description: |-
          The model(s) and algorithms at the heart of an AI system.
      TASK_AND_OUTPUT:
        description: |-
          The task the AI system is designed to perform and the outputs
          it produces (predictions, recommendations, decisions).
      PEOPLE_AND_PLANET:
        description: |-
          Human rights and the broader well-being of society and the
          planet - centred in Figure 2.

  AiActorTaskEnum:
    description: |-
      Categories of AI actor tasks as described in Appendix A and
      illustrated in Figure 3.
    in_subset: [lifecycle]
    permissible_values:
      AI_DESIGN:
        description: |-
          Performed during the Application Context and Data and Input
          phases; create the concept and objectives of AI systems and are
          responsible for planning, design, and data collection.
      AI_DEVELOPMENT:
        description: |-
          Performed during the AI Model phase; provide the initial
          infrastructure of AI systems (model building, selection,
          calibration, training, testing).
      AI_DEPLOYMENT:
        description: |-
          Performed during the Task and Output phase; responsible for
          contextual decisions on how the AI system is used and for
          assuring deployment into production.
      OPERATION_AND_MONITORING:
        description: |-
          Performed in the Application Context / Operate and Monitor
          phase; operating the AI system and regularly assessing system
          output and impacts.
      TEVV:
        description: |-
          Test, Evaluation, Verification, and Validation tasks performed
          throughout the AI lifecycle; examine the AI system or its
          components, and detect and remediate problems.
      HUMAN_FACTORS:
        description: |-
          Human-centered design practices and methodologies; promoting
          active involvement of end users and other interested parties;
          incorporating context-specific norms and values.
      DOMAIN_EXPERT:
        description: |-
          Input from multidisciplinary practitioners or scholars who
          provide knowledge or expertise in - and about - an industry
          sector, context, or application area.
      AI_IMPACT_ASSESSMENT:
        description: |-
          Assess and evaluate requirements for AI system accountability,
          combat harmful bias, examine impacts, product safety, liability,
          and security.
      PROCUREMENT:
        description: |-
          Conducted by AI actors with financial, legal, or policy
          management authority for acquisition of AI models, products, or
          services from a third party.
      GOVERNANCE_AND_OVERSIGHT:
        description: |-
          Assumed by AI actors with management, fiduciary, and legal
          authority for the organization, including senior leadership and
          the Board of Directors.
      THIRD_PARTY_ENTITIES:
        description: |-
          Providers, developers, vendors, and evaluators of data,
          algorithms, models, and/or systems and related services external
          to the deploying organization.
      END_USERS:
        description: |-
          Individuals or groups that use the AI system for specific
          purposes; range in competency from AI experts to first-time
          users.
      AFFECTED_INDIVIDUALS_OR_COMMUNITIES:
        description: |-
          All individuals, groups, communities, or organizations directly
          or indirectly affected by AI systems or decisions based on the
          output of AI systems.
      OTHER_AI_ACTORS:
        description: |-
          Provide formal or quasi-formal norms or guidance - includes
          trade associations, standards developing organizations, advocacy
          groups, researchers, environmental groups, and civil society
          organizations.
      GENERAL_PUBLIC:
        description: |-
          Most likely to directly experience positive and negative impacts
          of AI technologies; provides motivation for actions taken by
          other AI actors.

  TrustworthinessCharacteristicEnum:
    description: |-
      The seven characteristics of trustworthy AI systems described in
      Figure 4 and Part 1 §3.
    in_subset: [trustworthiness]
    permissible_values:
      VALID_AND_RELIABLE:
        description: |-
          Confirmation that requirements for a specific intended use have
          been fulfilled (validation) and that the system performs as
          required without failure (reliability). A necessary condition of
          trustworthiness and the base for other characteristics.
      SAFE:
        description: |-
          The system does not, under defined conditions, lead to a state
          in which human life, health, property, or the environment is
          endangered.
      SECURE_AND_RESILIENT:
        description: |-
          The system can withstand unexpected adverse events or changes
          (resilient) and maintain confidentiality, integrity, and
          availability through protection mechanisms (secure).
      ACCOUNTABLE_AND_TRANSPARENT:
        description: |-
          Trustworthy AI depends on accountability, which presupposes
          transparency - the extent to which information about an AI
          system and its outputs is available to those interacting with
          it.
      EXPLAINABLE_AND_INTERPRETABLE:
        description: |-
          Explainability concerns the mechanisms underlying an AI system's
          operation; interpretability concerns the meaning of its output
          in context.
      PRIVACY_ENHANCED:
        description: |-
          Norms and practices that help safeguard human autonomy,
          identity, and dignity - including anonymity, confidentiality,
          and control over personal information.
      FAIR_WITH_HARMFUL_BIAS_MANAGED:
        description: |-
          Concerns for equality and equity by addressing issues such as
          harmful bias and discrimination, and recognising that
          perceptions of fairness differ across cultures and
          applications.

  HarmCategoryEnum:
    description: |-
      High-level categories of harm related to AI systems (Figure 1).
    in_subset: [risk_and_harm]
    permissible_values:
      HARM_TO_PEOPLE:
        description: |-
          Harm to individuals, groups/communities, or society at large
          (including civil liberties, rights, physical or psychological
          safety, economic opportunity, democratic participation, and
          educational access).
      HARM_TO_AN_ORGANIZATION:
        description: |-
          Harm to an organization's business operations, security
          breaches or monetary loss, or reputation.
      HARM_TO_AN_ECOSYSTEM:
        description: |-
          Harm to interconnected and interdependent elements and
          resources, the global financial system, supply chain, natural
          resources, the environment, and the planet.

  HarmToPeopleSubcategoryEnum:
    description: |-
      Sub-categories of harm to people, per Figure 1.
    in_subset: [risk_and_harm]
    permissible_values:
      INDIVIDUAL:
        description: |-
          Harm to a person's civil liberties, rights, physical or
          psychological safety, or economic opportunity.
      GROUP_OR_COMMUNITY:
        description: |-
          Harm to a group such as discrimination against a population
          sub-group.
      SOCIETAL:
        description: |-
          Harm to democratic participation or educational access.

  BiasCategoryEnum:
    description: |-
      The three major categories of AI bias identified by NIST
      (Part 1 §3.7; see NIST SP 1270).
    in_subset: [trustworthiness]
    permissible_values:
      SYSTEMIC:
        description: |-
          Bias present in AI datasets, organizational norms, practices,
          and processes across the AI lifecycle, and the broader society
          that uses AI systems.
      COMPUTATIONAL_AND_STATISTICAL:
        description: |-
          Bias present in AI datasets and algorithmic processes; often
          stems from systematic errors due to non-representative samples.
      HUMAN_COGNITIVE:
        description: |-
          Bias related to how an individual or group perceives AI system
          information to make a decision or fill in missing information;
          omnipresent in decision-making across the AI lifecycle.

  RiskMeasurementChallengeEnum:
    description: |-
      Challenges that complicate AI risk measurement (Part 1 §1.2.1).
    in_subset: [risk_and_harm]
    permissible_values:
      THIRD_PARTY_SOFTWARE_HARDWARE_AND_DATA:
        description: |-
          Risks related to third-party software, hardware, and data,
          including misalignment of risk metrics or methodologies between
          developers, deployers, and operators.
      TRACKING_EMERGENT_RISKS:
        description: |-
          Identifying and tracking emergent risks and considering
          techniques for measuring them; impact assessment helps
          understand context-specific harms.
      AVAILABILITY_OF_RELIABLE_METRICS:
        description: |-
          Lack of consensus on robust and verifiable measurement methods
          for risk and trustworthiness, and their applicability to
          different use cases.
      RISK_AT_DIFFERENT_LIFECYCLE_STAGES:
        description: |-
          Measuring risk at different stages may yield different results;
          some risks may be latent and increase as systems adapt and
          evolve.
      RISK_IN_REAL_WORLD_SETTINGS:
        description: |-
          Lab measurements may differ from risks that emerge in
          operational, real-world settings.
      INSCRUTABILITY:
        description: |-
          Opaque systems with limited explainability or interpretability,
          poor documentation, or inherent uncertainty complicate risk
          measurement.
      HUMAN_BASELINE:
        description: |-
          AI systems intended to augment or replace human activity
          require a human baseline for comparison, which is difficult to
          systematize.

  RiskResponseEnum:
    description: |-
      Treatment options for AI risks (MANAGE 1.3).
    in_subset: [risk_and_harm]
    permissible_values:
      MITIGATING:
        description: Reducing the likelihood or magnitude of the risk.
      TRANSFERRING:
        description: Shifting the risk to another party (e.g., via insurance or contract).
      AVOIDING:
        description: Choosing not to engage in the activity that creates the risk.
      ACCEPTING:
        description: Acknowledging the risk and taking no further action.

  ProfileTypeEnum:
    description: |-
      Types of AI RMF Profile (§6).
    in_subset: [profiles]
    permissible_values:
      USE_CASE:
        description: |-
          Implementation of the AI RMF Core for a specific setting or
          application (e.g., a hiring profile, a fair housing profile).
      TEMPORAL_CURRENT:
        description: |-
          Description of the current state of AI risk management
          activities within a sector, industry, organization, or
          application context.
      TEMPORAL_TARGET:
        description: |-
          Description of the desired or target state of AI risk
          management activities.
      CROSS_SECTORAL:
        description: |-
          Risks of models or applications used across use cases or
          sectors (e.g., large language models, cloud-based services,
          acquisition).

  AudienceEnum:
    description: |-
      Audience categorisation for the AI RMF (Part 1 §2).
    in_subset: [lifecycle]
    permissible_values:
      PRIMARY:
        description: |-
          AI actors who perform or manage the design, development,
          deployment, evaluation, and use of AI systems and drive AI
          risk management efforts.
      INFORMING:
        description: |-
          AI actors in the People and Planet dimension who *inform* the
          primary audience - trade associations, standards developers,
          researchers, advocacy groups, civil society organisations,
          end users, and impacted individuals or communities.

  ImpactSignEnum:
    description: |-
      Whether an impact of an AI system is positive, negative, or both
      (Part 1 §1.1).
    in_subset: [risk_and_harm]
    permissible_values:
      POSITIVE:
        description: A beneficial impact or opportunity.
      NEGATIVE:
        description: A harmful impact or threat.
      MIXED:
        description: An impact that is both positive and negative.

# ============================================================================
# Slots
# ============================================================================
slots:
  id:
    identifier: true
    range: uriorcurie
    required: true
    description: A unique identifier for an element.
    slot_uri: schema:identifier
    in_subset: [base]

  name:
    range: string
    description: A short human-readable name.
    slot_uri: rdfs:label
    in_subset: [base]

  title:
    range: string
    description: A human-readable title.
    slot_uri: dcterms:title
    in_subset: [base]

  description:
    range: string
    description: A human-readable description.
    slot_uri: dcterms:description
    in_subset: [base]

  source:
    range: uriorcurie
    description: |-
      Reference to the source of the element (typically the document
      or section it originated from).
    slot_uri: dcterms:source
    in_subset: [base]

  see_also:
    range: uriorcurie
    multivalued: true
    description: Related references.
    slot_uri: rdfs:seeAlso
    in_subset: [base]

  # ----- Framework Core structural slots -----

  function_code:
    range: FunctionCode
    required: true
    description: The function code (GOVERN, MAP, MEASURE, or MANAGE).
    in_subset: [framework_core]

  categories:
    range: Category
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Categories that belong to a Function.
    in_subset: [framework_core]

  subcategories:
    range: Subcategory
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Subcategories that belong to a Category.
    in_subset: [framework_core]

  category_id:
    range: CategoryCode
    description: Identifier of a Category (e.g., "GOVERN 1").
    in_subset: [framework_core]

  subcategory_id:
    range: SubcategoryCode
    description: Identifier of a Subcategory (e.g., "GOVERN 1.1").
    in_subset: [framework_core]

  outcome:
    range: string
    description: |-
      The outcome statement of a Category or Subcategory - the desired
      result of carrying out its actions.
    in_subset: [framework_core]
    close_mappings:
      - nist_csf:prose

  # ----- Risk / Harm slots -----

  impact_sign:
    range: ImpactSignEnum
    description: Whether the impact is positive, negative, or both.
    in_subset: [risk_and_harm]

  likelihood:
    range: float
    minimum_value: 0.0
    maximum_value: 1.0
    description: |-
      Estimated probability of the event occurring (0.0 to 1.0). The
      AI RMF leaves quantification approaches to the implementer.
    in_subset: [risk_and_harm]
    close_mappings:
      - iso27001:LikelihoodRating

  magnitude:
    range: string
    description: |-
      Magnitude or degree of consequences if the event occurs (free
      text or qualitative scale).
    in_subset: [risk_and_harm]
    close_mappings:
      - iso27001:ImpactRating

  harm_category:
    range: HarmCategoryEnum
    description: The high-level harm category (people / organization / ecosystem).
    in_subset: [risk_and_harm]

  harm_to_people_subcategory:
    range: HarmToPeopleSubcategoryEnum
    description: The sub-category when harm is to people (individual / group / societal).
    in_subset: [risk_and_harm]

  affects:
    range: NamedThing
    multivalued: true
    description: |-
      Entities (people, organizations, ecosystems) the risk or harm
      may affect.
    in_subset: [risk_and_harm]

  risk_response:
    range: RiskResponseEnum
    description: The chosen risk treatment option.
    in_subset: [risk_and_harm]
    exact_mappings:
      - iso27001:RiskTreatmentOption

  is_residual:
    range: boolean
    description: |-
      Whether this risk represents risk remaining after risk treatment
      (residual risk per ISO Guide 73).
    in_subset: [risk_and_harm]

  # ----- Lifecycle slots -----

  lifecycle_stage:
    range: AiLifecycleStageEnum
    description: The AI lifecycle stage(s) the element applies to.
    multivalued: true
    in_subset: [lifecycle]

  ai_dimension:
    range: AiSystemDimensionEnum
    description: The AI system dimension the element applies to.
    multivalued: true
    in_subset: [lifecycle]

  actor_task:
    range: AiActorTaskEnum
    description: AI actor task category.
    multivalued: true
    in_subset: [lifecycle]

  is_tevv:
    range: boolean
    description: |-
      Whether the actor or task is a Test, Evaluation, Verification, and
      Validation (TEVV) actor / task.
    in_subset: [lifecycle]

  audience:
    range: AudienceEnum
    description: |-
      Whether the actor is part of the *primary* AI RMF audience or the
      *informing* People-and-Planet audience.
    in_subset: [lifecycle]

  # ----- Trustworthiness slots -----

  trustworthiness_characteristic:
    range: TrustworthinessCharacteristicEnum
    multivalued: true
    description: |-
      Trustworthiness characteristic(s) the element pertains to.
    in_subset: [trustworthiness]

  bias_category:
    range: BiasCategoryEnum
    multivalued: true
    description: Category or categories of bias addressed.
    in_subset: [trustworthiness]

  # ----- Profile slots -----

  profile_type:
    range: ProfileTypeEnum
    required: true
    description: The kind of AI RMF Profile.
    in_subset: [profiles]

  target_state:
    range: string
    description: |-
      For temporal target profiles - the outcomes needed to achieve the
      desired AI risk management goals.
    in_subset: [profiles]

  current_state:
    range: string
    description: |-
      For temporal current profiles - how AI is currently being managed
      and related risks in terms of current outcomes.
    in_subset: [profiles]

  # ----- Document / publication slots -----

  publisher:
    range: string
    description: The publisher of the document (e.g., NIST).
    slot_uri: dcterms:publisher
    in_subset: [base]

  doi:
    range: uriorcurie
    description: Digital Object Identifier for the document.
    in_subset: [base]

  published_date:
    range: date
    description: Date the document was published.
    slot_uri: dcterms:issued
    in_subset: [base]

  version:
    range: string
    description: Version identifier of the document.
    slot_uri: schema:version
    in_subset: [base]

  # ----- Playbook enrichment slots -----

  about_text:
    range: string
    description: |-
      Free-text discussion of the subcategory or related concept.
      Corresponds to the AI RMF Playbook "About" section.
    in_subset: [playbook]

  suggested_actions_text:
    range: string
    description: |-
      Free-text bulleted list of suggested actions an organization can
      take. Corresponds to the AI RMF Playbook "Actions" section.
    in_subset: [playbook]

  documentation_questions:
    range: string
    description: |-
      Free-text documentation questions and transparency resources.
      Corresponds to the AI RMF Playbook "Documentation" section.
    in_subset: [playbook]

  references_text:
    range: string
    description: |-
      Free-text list of references, citations, and supporting
      resources. Corresponds to the AI RMF Playbook "References"
      section.
    in_subset: [playbook]

  topics:
    range: string
    multivalued: true
    description: |-
      Free-text topic tags applied to a playbook entry (e.g.,
      "Governance", "Trustworthy Characteristics", "Validity and
      Reliability").
    in_subset: [playbook]

  ai_actor_categories:
    range: string
    multivalued: true
    description: |-
      Free-text list of AI Actor categories the entry applies to,
      preserving the original case used in the AI RMF Playbook
      (e.g., "Governance and Oversight", "TEVV"). For controlled
      enum values see `actor_task` (range AiActorTaskEnum).
    in_subset: [playbook]

  function_kind:
    range: FunctionEnum
    description: The AI RMF Core function this entry pertains to.
    in_subset: [framework_core]

  category_code:
    range: string
    description: |-
      Compact category code in the form "FUNCTION-N" (e.g.,
      "GOVERN-1") as used in the AI RMF Playbook.
    in_subset: [playbook]

  # ----- "kind" discriminator slots (single-enum tag for typed concept classes) -----

  dimension_kind:
    range: AiSystemDimensionEnum
    required: true
    description: Which AI system dimension an `AiSystemDimension` instance represents.
    in_subset: [lifecycle]

  stage_kind:
    range: AiLifecycleStageEnum
    required: true
    description: Which AI lifecycle stage an `AiLifecycleStage` instance represents.
    in_subset: [lifecycle]

  includes_tevv:
    range: boolean
    description: Whether the lifecycle stage incorporates TEVV activities.
    in_subset: [lifecycle]

  task_kind:
    range: AiActorTaskEnum
    required: true
    description: Which AI actor task category an `AiActorTask` instance represents.
    in_subset: [lifecycle]

  typical_actors:
    range: string
    multivalued: true
    description: Representative actor roles that perform an AI actor task.
    in_subset: [lifecycle]

  challenge_kind:
    range: RiskMeasurementChallengeEnum
    required: true
    description: Which risk-measurement challenge a `RiskMeasurementChallenge` represents.
    in_subset: [risk_and_harm]

  characteristic_kind:
    range: TrustworthinessCharacteristicEnum
    required: true
    description: Which trustworthiness characteristic a `TrustworthinessCharacteristic` represents.
    in_subset: [trustworthiness]

  is_base_condition:
    range: boolean
    description: |-
      True when this characteristic is a necessary condition for
      trustworthiness (per Figure 4 - Valid and Reliable is the base
      of all others).
    in_subset: [trustworthiness]

  is_cross_cutting:
    range: boolean
    description: |-
      True when this characteristic relates to all others
      (Accountable and Transparent; shown vertically in Figure 4).
    in_subset: [trustworthiness]

  # ----- Risk / Tolerance auxiliary slots -----

  related_impacts:
    range: Impact
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: The impacts that contribute to a risk.
    in_subset: [risk_and_harm]

  affects_system:
    range: AiSystem
    description: The AI system a risk pertains to.
    in_subset: [risk_and_harm]

  tolerance_statement:
    range: string
    description: Free-text statement of a risk tolerance level or threshold.
    in_subset: [risk_and_harm]

  legal_basis:
    range: string
    description: Legal or regulatory requirements influencing a risk tolerance.
    in_subset: [risk_and_harm]

  # ----- Profile slots (cont.) -----

  sector:
    range: string
    description: |-
      The sector, industry, technology, or end-use application a
      profile addresses (e.g., "hiring", "fair housing").
    in_subset: [profiles]

  addresses:
    range: Subcategory
    multivalued: true
    description: Subcategories that a profile implements or addresses.
    in_subset: [profiles]

  # ----- Playbook container slot -----

  entries:
    range: PlaybookEntry
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: The Playbook entries in a `PlaybookCollection`.
    in_subset: [playbook]

  # ----- AiRmfFramework container slots -----

  document:
    range: AiRmfDocument
    inlined: true
    description: Publication metadata of the framework instance.
    in_subset: [base]

  functions:
    range: Function
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: The four AI RMF Core functions and their content.
    in_subset: [framework_core]

  trustworthiness_characteristics:
    range: TrustworthinessCharacteristic
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: The seven characteristics of trustworthy AI.
    in_subset: [trustworthiness]

  lifecycle_stages:
    range: AiLifecycleStage
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: The AI lifecycle stages (Figure 2).
    in_subset: [lifecycle]

  dimensions:
    range: AiSystemDimension
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: The AI system dimensions (Figure 2).
    in_subset: [lifecycle]

  actor_tasks:
    range: AiActorTask
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: AI actor task categories (Appendix A).
    in_subset: [lifecycle]

  profiles:
    range: AiRmfProfile
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: AI RMF profiles defined alongside this Framework instance.
    in_subset: [profiles]

  attributes_:
    range: RmfAttribute
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Design attributes of the AI RMF (Appendix D).
    slot_uri: nist_ai_100_1:attributes
    aliases:
      - rmf_attributes
    in_subset: [attributes]

  risk_measurement_challenges:
    range: RiskMeasurementChallenge
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Identified challenges in measuring AI risk.
    in_subset: [risk_and_harm]

  ai_specific_risks:
    range: AiSpecificRisk
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: AI-specific risks compared to traditional software (Appendix B).
    in_subset: [ai_risk_distinctions]

  human_ai_interaction_issues:
    range: HumanAiInteractionIssue
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Human-AI interaction considerations (Appendix C).
    in_subset: [human_ai_interaction]

# ============================================================================
# Classes
# ============================================================================
classes:
  # --------------------------------------------------------------------------
  # Root and abstract base
  # --------------------------------------------------------------------------
  NamedThing:
    abstract: true
    description: A generic grouping for any identifiable AI RMF element.
    slots:
      - id
      - name
      - title
      - description
      - see_also
    class_uri: schema:Thing
    in_subset: [base]
    close_mappings:
      - schema:Thing

  # --------------------------------------------------------------------------
  # AI System and lifecycle
  # --------------------------------------------------------------------------
  AiSystem:
    is_a: NamedThing
    description: |-
      An engineered or machine-based system that can, for a given set
      of objectives, generate outputs such as predictions,
      recommendations, or decisions influencing real or virtual
      environments. AI systems are designed to operate with varying
      levels of autonomy (Adapted from OECD Recommendation on AI:2019;
      ISO/IEC 22989:2022).
    slots:
      - lifecycle_stage
      - ai_dimension
    in_subset: [lifecycle]
    close_mappings:
      - schema:SoftwareApplication

  AiSystemDimension:
    is_a: NamedThing
    description: |-
      A socio-technical dimension of an AI system (Figure 2):
      Application Context, Data and Input, AI Model, Task and Output,
      or People and Planet.
    slots:
      - dimension_kind
    in_subset: [lifecycle]

  AiLifecycleStage:
    is_a: NamedThing
    description: |-
      A stage of the AI lifecycle (Figure 2): Plan and Design,
      Collect and Process Data, Build and Use Model, Verify and
      Validate, Deploy and Use, or Operate and Monitor.
    slots:
      - stage_kind
      - includes_tevv
    in_subset: [lifecycle]

  AiActor:
    is_a: NamedThing
    description: |-
      An organization or individual that plays an active role in the AI
      system lifecycle. AI actors include those who deploy or operate
      AI as well as those who inform via formal or quasi-formal norms
      and guidance (OECD 2019).
    slots:
      - actor_task
      - lifecycle_stage
      - is_tevv
      - audience
    in_subset: [lifecycle]
    close_mappings:
      - prov:Agent
      - foaf:Agent
    related_mappings:
      - stix:Identity
      - iso27001:InterestedParty

  AiActorTask:
    is_a: NamedThing
    description: |-
      A category of task performed by AI actors (Appendix A). Each
      task is associated with one or more lifecycle stages and a
      typical set of actor roles.
    slots:
      - task_kind
      - typical_actors
      - lifecycle_stage
      - ai_dimension
    in_subset: [lifecycle]

  # --------------------------------------------------------------------------
  # Risk, Impact, Harm
  # --------------------------------------------------------------------------
  Risk:
    is_a: NamedThing
    description: |-
      The composite measure of an event's probability of occurring and
      the magnitude or degree of the consequences of that event. When
      considering negative impact, risk is a function of (1) the
      negative impact or magnitude of harm and (2) the likelihood of
      occurrence (Adapted from ISO 31000:2018; OMB Circular A-130:2016).
    slots:
      - likelihood
      - magnitude
      - impact_sign
      - is_residual
      - risk_response
      - lifecycle_stage
      - trustworthiness_characteristic
      - related_impacts
      - affects_system
    in_subset: [risk_and_harm]
    exact_mappings:
      - iso27001:Risk
    related_mappings:
      - iso29100:PrivacyRisk

  Impact:
    is_a: NamedThing
    description: |-
      A positive, negative, or both consequence of an AI system. Impacts
      can manifest as opportunities (positive) or threats (negative).
    slots:
      - impact_sign
      - magnitude
      - likelihood
      - affects
    in_subset: [risk_and_harm]
    narrow_mappings:
      - iso27001:ImpactRating

  Harm:
    is_a: NamedThing
    description: |-
      A negative impact that may be experienced by individuals,
      groups, communities, organizations, society, the environment, or
      the planet (Figure 1).
    slots:
      - harm_category
      - harm_to_people_subcategory
      - magnitude
      - affects
    in_subset: [risk_and_harm]

  ResidualRisk:
    is_a: Risk
    description: |-
      Risk remaining after risk treatment (ISO Guide 73). Documenting
      residual risks helps system providers consider risks of deploying
      the AI product and informs end users about potential negative
      impacts.
    slot_usage:
      is_residual:
        ifabsent: "True"
    in_subset: [risk_and_harm]
    narrow_mappings:
      - iso27001:Risk

  RiskTolerance:
    is_a: NamedThing
    description: |-
      The organization's or AI actor's readiness to bear risk in order
      to achieve its objectives (Adapted from ISO Guide 73). Risk
      tolerance is highly contextual and application- and use-case
      specific.
    slots:
      - tolerance_statement
      - legal_basis
    in_subset: [risk_and_harm]
    close_mappings:
      - iso27001:RiskLevel

  RiskMeasurementChallenge:
    is_a: NamedThing
    description: |-
      A challenge that complicates measurement of AI risks
      (Part 1 §1.2.1).
    slots:
      - challenge_kind
    in_subset: [risk_and_harm]

  # --------------------------------------------------------------------------
  # Trustworthiness
  # --------------------------------------------------------------------------
  TrustworthinessCharacteristic:
    is_a: NamedThing
    description: |-
      A characteristic of a trustworthy AI system (Figure 4 / Part 1
      §3). The seven characteristics are inter-related; addressing them
      individually does not guarantee trustworthiness, and tradeoffs
      are usually involved.
    slots:
      - characteristic_kind
      - is_base_condition
      - is_cross_cutting
    in_subset: [trustworthiness]

  Bias:
    is_a: NamedThing
    description: |-
      A form of AI bias - a deviation that may be perpetuated or
      amplified by AI systems. NIST identifies three major categories:
      systemic, computational/statistical, and human-cognitive
      (Part 1 §3.7; NIST SP 1270).
    slots:
      - bias_category
    in_subset: [trustworthiness]
    related_mappings:
      - iso29100:PrivacyPrinciple

  # --------------------------------------------------------------------------
  # AI RMF Core - Functions, Categories, Subcategories
  # --------------------------------------------------------------------------
  Function:
    is_a: NamedThing
    description: |-
      A top-level AI RMF Core function. Each function organizes AI risk
      management activities at the highest level. GOVERN applies across
      all stages; MAP, MEASURE, and MANAGE apply to AI-system-specific
      contexts and lifecycle stages.
    slots:
      - function_code
      - categories
    in_subset: [framework_core]
    slot_usage:
      categories:
        range: Category
        multivalued: true
        inlined: true
        inlined_as_list: true
    exact_mappings:
      - nist_csf:CSFFunction
    related_mappings:
      - gist_linkml:Function

  Category:
    is_a: NamedThing
    description: |-
      A category within an AI RMF Core function (e.g., "GOVERN 1:
      Policies, processes, procedures, and practices ... are in place,
      transparent, and implemented effectively"). Categories group
      related subcategories.
    slots:
      - category_id
      - outcome
      - subcategories
    in_subset: [framework_core]
    slot_usage:
      id:
        description: |-
          Identifier for the category, typically using the
          "FUNCTION N" form (e.g., "GOVERN 1").
      subcategories:
        range: Subcategory
        multivalued: true
        inlined: true
        inlined_as_list: true
    exact_mappings:
      - nist_csf:CSFCategory

  Subcategory:
    is_a: NamedThing
    description: |-
      A subcategory within an AI RMF Core category (e.g., "GOVERN 1.1:
      Legal and regulatory requirements involving AI are understood,
      managed, and documented"). Subcategories express specific
      outcomes.
    slots:
      - subcategory_id
      - outcome
      - trustworthiness_characteristic
      - lifecycle_stage
      - about_text
      - suggested_actions_text
      - documentation_questions
      - references_text
      - topics
      - ai_actor_categories
    in_subset: [framework_core]
    slot_usage:
      id:
        description: |-
          Identifier for the subcategory in the "FUNCTION N.M" form
          (e.g., "GOVERN 1.1").
    exact_mappings:
      - nist_csf:CSFSubcategory
    close_mappings:
      - oscal_catalog:Control
      - nist_sp_800_53:Control

  # --------------------------------------------------------------------------
  # Profiles
  # --------------------------------------------------------------------------
  AiRmfProfile:
    is_a: NamedThing
    description: |-
      An implementation of the AI RMF Functions, Categories, and
      Subcategories for a specific setting or application based on the
      requirements, risk tolerance, and resources of the user (§6).
      Profiles may be use-case-specific, temporal (current or target),
      or cross-sectoral.
    slots:
      - profile_type
      - current_state
      - target_state
      - sector
      - addresses
    in_subset: [profiles]
    exact_mappings:
      - oscal_profile:Profile
    close_mappings:
      - nist_sp_800_53:ProfileDocument

  # --------------------------------------------------------------------------
  # AI RMF Attributes (Appendix D)
  # --------------------------------------------------------------------------
  RmfAttribute:
    is_a: NamedThing
    description: |-
      A design attribute of the AI RMF (Appendix D) - one of the
      qualities the Framework strives to embody (e.g., risk-based,
      consensus-driven, plain language, common language, easily usable,
      universally applicable, outcome-focused, leveraging existing
      standards, law- and regulation-agnostic, living document).
    in_subset: [attributes]
    related_mappings:
      - nist_csf:CSFProperty

  # --------------------------------------------------------------------------
  # Appendix B / C: Distinctions and Human-AI interaction
  # --------------------------------------------------------------------------
  AiSpecificRisk:
    is_a: NamedThing
    description: |-
      A risk that is new or increased for AI-based technology compared
      to traditional software (Appendix B) - e.g., data quality, model
      drift, opacity, scale and complexity, pre-trained model
      uncertainty, emergent properties, privacy aggregation, or
      environmental cost.
    in_subset: [ai_risk_distinctions]
    broad_mappings:
      - iso27001:Risk

  HumanAiInteractionIssue:
    is_a: NamedThing
    description: |-
      An issue that merits further consideration in human-AI
      interaction (Appendix C) - e.g., clear human roles and
      responsibilities, systemic and human-cognitive biases in design,
      variability of human-AI interaction outcomes, complexity of
      presenting AI system information to humans.
    in_subset: [human_ai_interaction]
    related_mappings:
      - iso27001:InterestedParty

  # --------------------------------------------------------------------------
  # AI RMF Playbook companion data
  # --------------------------------------------------------------------------
  PlaybookEntry:
    description: |-
      A single AI RMF Playbook entry - an enrichment of a Core
      subcategory with prose discussion, suggested actions,
      documentation questions, references, and topic tags.

      Attribute names use the same identifiers found in the published
      NIST AI RMF Playbook JSON (e.g., `section_about`,
      `section_actions`) so that the data can be loaded directly.
    attributes:
      type:
        range: string
        description: |-
          Function label as serialised in the published Playbook JSON
          (Title case - "Govern", "Map", "Measure", "Manage"). For
          the controlled enum see `function_kind`.
      title:
        range: string
        description: |-
          Subcategory identifier (e.g., "GOVERN 1.1"). Mirrors the
          AI RMF Subcategory `subcategory_id`.
      category:
        range: string
        description: |-
          Category code in the form "FUNCTION-N" (e.g., "GOVERN-1")
          as used in the Playbook.
      description:
        range: string
        description: Outcome statement of the subcategory.
      section_about:
        range: string
        description: Free-text discussion ("About" section).
      section_actions:
        range: string
        description: Bulleted suggested actions ("Actions" section).
      section_doc:
        range: string
        description: |-
          Documentation questions and transparency resources
          ("Documentation" section).
      section_ref:
        range: string
        description: References and citations ("References" section).
      ai_actors:
        range: string
        multivalued: true
        description: |-
          AI actor categories the entry applies to. Free-text to
          preserve the casing of the source data (e.g., "Governance
          and Oversight").
      topic:
        range: string
        multivalued: true
        description: |-
          Topic tags (e.g., "Legal and Regulatory", "Validity and
          Reliability").
    unique_keys:
      primary:
        unique_key_slots:
          - title
    in_subset: [playbook]
    close_mappings:
      - nist_csf:CSFSubcategory

  PlaybookCollection:
    description: |-
      A container for a set of PlaybookEntry instances - the
      serialisation root for an AI RMF Playbook companion document.
      Validate with ``linkml-validate --target-class PlaybookCollection``;
      the canonical tree-root for the schema is ``AiRmfFramework``.
    slots:
      - entries
    in_subset: [playbook]

  # --------------------------------------------------------------------------
  # Publication metadata
  # --------------------------------------------------------------------------
  AiRmfDocument:
    is_a: NamedThing
    description: |-
      Publication metadata for an instance of the AI RMF (e.g., NIST
      AI 100-1, January 2023). The Framework is intended to be a
      living document, employing a two-number versioning system (major.minor).
    slots:
      - version
      - publisher
      - doi
      - published_date
      - source
    in_subset: [base]
    close_mappings:
      - nist_csf:CSFMetadata
    related_mappings:
      - schema:CreativeWork

  # --------------------------------------------------------------------------
  # Container / tree root
  # --------------------------------------------------------------------------
  AiRmfFramework:
    is_a: NamedThing
    tree_root: true
    description: |-
      Root container that bundles the AI RMF Core (Functions) with
      foundational concepts (trustworthiness characteristics,
      lifecycle, actors, risks, harms), profiles, and Framework
      attributes. Designed for serialising the Framework or a tailored
      instance of it as a single JSON / YAML document.
    slots:
      - document
      - functions
      - trustworthiness_characteristics
      - lifecycle_stages
      - dimensions
      - actor_tasks
      - profiles
      - attributes_
      - risk_measurement_challenges
      - ai_specific_risks
      - human_ai_interaction_issues
    in_subset: [base]
    close_mappings:
      - nist_csf:CSFDocument
      - oscal_catalog:Catalog
      - nist_sp_800_53:Catalog
