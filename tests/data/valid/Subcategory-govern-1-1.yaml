id: "nist_ai_100_1:GOVERN_1.1"
subcategory_id: GOVERN 1.1
title: GOVERN 1.1
name: GOVERN 1.1
outcome: |-
  Legal and regulatory requirements involving AI are understood,
  managed, and documented.
description: |-
  AI systems may be subject to specific applicable legal and
  regulatory requirements.
trustworthiness_characteristic:
  - ACCOUNTABLE_AND_TRANSPARENT
about_text: |-
  AI systems may be subject to specific applicable legal and
  regulatory requirements. Some legal requirements can mandate (e.g.,
  nondiscrimination, data privacy and security controls)
  documentation, disclosure, and increased AI system transparency.
suggested_actions_text: |-
  * Maintain awareness of the applicable legal and regulatory
    considerations and requirements specific to industry, sector,
    and business purpose.
  * Align risk management efforts with applicable legal standards.
documentation_questions: |-
  ### Organizations can document the following
  - To what extent has the entity defined and documented the
    regulatory environment - including minimum requirements in laws
    and regulations?
references_text: |-
  Andrew Smith, "Using Artificial Intelligence and Algorithms," FTC
  Business Blog (2020).
topics:
  - Legal and Regulatory
  - Governance
  - AI Actor Training
ai_actor_categories:
  - Governance and Oversight
